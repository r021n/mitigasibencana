<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Safety Orange to Crimson/Red -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#E52E2E" />
    </linearGradient>
    <!-- Shadow for Depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Shield Shape representing protection/mitigation -->
  <path d="M256,40 C340,40 430,70 430,170 C430,300 320,410 256,472 C192,410 82,300 82,170 C82,70 172,40 256,40 Z" fill="url(#shieldGrad)" filter="url(#dropShadow)" />
  <!-- Inner Shield Highlight for premium look -->
  <path d="M256,65 C320,65 390,90 390,170 C390,280 295,375 256,430 C217,375 122,280 122,170 C122,90 192,65 256,65 Z" fill="#ffffff" fill-opacity="0.1" />
  <!-- Warning / Alert Symbol inside the shield -->
  <!-- Triangle base -->
  <path d="M256,130 L350,290 C356,300 350,312 338,312 L174,312 C162,312 156,300 162,290 L256,130 Z" fill="#FFFFFF" />
  <!-- Exclamation Mark in the triangle -->
  <rect x="248" y="190" width="16" height="60" rx="8" fill="#E52E2E" />
  <circle cx="256" cy="280" r="10" fill="#E52E2E" />
</svg>